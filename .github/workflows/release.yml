name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Build prebuilt binaries for the common targets so users can
  # `cargo binstall cargo-impact` or download from the GitHub release.
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Install cross (Linux aarch64)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi
      - name: Package artifact
        shell: bash
        run: |
          bin="cargo-impact${{ matrix.ext }}"
          archive="cargo-impact-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$archive"
          cp "target/${{ matrix.target }}/release/$bin" "dist/$archive/"
          cp README.md LICENSE "dist/$archive/"
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$archive.zip" "$archive"
            echo "ASSET=dist/$archive.zip" >> "$GITHUB_ENV"
          else
            tar czf "$archive.tar.gz" "$archive"
            echo "ASSET=dist/$archive.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          # Pre-1.0 releases are drafts by default — promote manually after smoke test.
          draft: ${{ startsWith(github.ref_name, 'v0.') }}

  # Publish to crates.io. Requires CRATES_IO_TOKEN repo secret.
  # Disabled as a manual gate on pre-1.0 releases — flip `if:` once v1.0 ships.
  crates-io:
    needs: build
    if: false # TODO: enable once v0.1 is ready and CRATES_IO_TOKEN is configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
