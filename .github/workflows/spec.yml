name: Spec

# Checks that run against the design spec itself — active even before
# any Rust code exists. Keeps the README honest and link-rot-free.

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - .github/workflows/spec.yml
      - .lycheeignore
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - .github/workflows/spec.yml
      - .lycheeignore
  schedule:
    # Monthly link rot check — external repos get renamed, tools get archived.
    - cron: "0 6 1 * *"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --accept 200,204,206,301,302,308,429
            --timeout 20
            --max-retries 2
            --exclude-path target
            './**/*.md'
          fail: true
